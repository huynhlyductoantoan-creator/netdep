<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>⚡ ĐẤU TRƯỜNG SIÊU NHÍ: CHINH PHỤC VIỆT NAM</title>
	<link href='https://fonts.googleapis.com/css?family=Oswald' rel='stylesheet' type='text/css'>
	<style>
		@import url(https://fonts.googleapis.com/css?family=Poiret+One);
		:root {
			--pole-dark: #1e2635;
			--pole-light: #233451;
			--sewer-dark: #3a392f;
			--sewer-light: #4a4a3d;
			--ground-light: #83744b;
			--ground-dark: #6d5f45;
		}

		body {
			margin: 0;
			padding: 0;
			width: 100vw;
			height: 100vh;
			overflow: hidden;
			display: flex;
			align-items: center;
			justify-content: center;
			background: linear-gradient(180deg, #17175f, #ffd844);
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			user-select: none;
		}

		/* ==========================================================================
		   MÀN HÌNH CHÀO (INTRO DEADLINE SCREEN) STYLES
		   ========================================================================== */
		#intro-screen {
			position: fixed;
			top: 0;
			left: 0;
			width: 100vw;
			height: 100vh;
			background: #000;
			z-index: 99999;
			transition: opacity 0.8s ease, visibility 0.8s ease;
		}

		#deadline {
			width: 581px;
			max-width: 90%;
			height: 158px;
			position: absolute;
			top: 45%;
			left: 50%;
			z-index: 1;
			transform: translate(-50%, -50%);
		}

		#deadline svg { width: 100%; }

		#progress-time-fill {
			animation-name: progress-fill; 
			animation-timing-function: linear; 
			animation-iteration-count: infinite;
		}

		#death-group {
			animation-name: walk;
			animation-timing-function: ease;
			animation-iteration-count: infinite;
			transform: translateX(0);
		}

		#death-arm {
			animation: move-arm 3s ease infinite;
			transform-origin: -60px 74px;
		}

		#death-tool {
			animation: move-tool 3s ease infinite;
			transform-origin: -48px center;
		}

		#designer-arm-grop {
			animation: write 1.5s ease infinite;
			transform: translate(0, 0) rotate(0deg) scale(1, 1);
			transform-origin: 90% top;
		}

		.deadline-days {
			color: #fff;
			text-align: center;
			width: 200px;
			margin: 20px auto 0;
			position: relative;
			height: 30px;
			font-family: 'Oswald', sans-serif;
			font-size: 1.5rem;
		}

		.deadline-days .inner {
			width: 200px;
			position: relative;
			top: 0;
			left: 0;
		}

		.mask-red, .mask-white {
			position: absolute;
			top: 0;
			width: 100%;
			overflow: hidden;
			height: 100%;
		}

		.mask-red {
			left: 0;
			width: 0;
			color: #BE002A;
			animation: text-red 7s ease infinite; /* Đồng bộ với animationTime */
			z-index: 2;
			background: #000;
		}
		.mask-white { right: 0; }

		#red-flame, #yellow-flame, #white-flame { opacity: 0; transform-origin: center bottom; }
		#red-flame { animation: show-flames 7s ease infinite, red-flame 120ms ease infinite; }
		#yellow-flame { animation: show-flames 7s ease infinite, yellow-flame 120ms ease infinite; }
		#white-flame { animation: show-flames 7s ease infinite, red-flame 100ms ease infinite; }

		#skip-intro-btn {
			position: absolute;
			bottom: 15%;
			left: 50%;
			transform: translateX(-50%);
			background: linear-gradient(135deg, #ff5722 0%, #ff9800 100%);
			color: white;
			border: none;
			padding: 12px 35px;
			font-size: 16px;
			font-weight: bold;
			border-radius: 25px;
			cursor: pointer;
			box-shadow: 0 5px 20px rgba(255, 87, 34, 0.4);
			transition: all 0.2s ease;
			z-index: 100000;
		}
		#skip-intro-btn:hover { transform: translateX(-50%) scale(1.05); background: linear-gradient(135deg, #ff7043 0%, #ffa726 100%); }

		/* KEYFRAMES INTRO */
		@keyframes progress-fill { 0% { x: -100%; } 100% { x: -3%; } }
		@keyframes walk {
			0%, 6% { transform: translateX(0); }
			10% { transform: translateX(100px); }
			15% { transform: translateX(140px); }
			25% { transform: translateX(170px); }
			35% { transform: translateX(220px); }
			45% { transform: translateX(280px); }
			55% { transform: translateX(340px); }
			65% { transform: translateX(370px); }
			75% { transform: translateX(430px); }
			85% { transform: translateX(460px); }
			100% { transform: translateX(520px); }
		}
		@keyframes move-arm { 0%, 5%, 80% { transform: rotate(0); } 9% { transform: rotate(40deg); } }
		@keyframes move-tool { 0%, 5%, 80% { transform: rotate(0); } 9% { transform: rotate(50deg); } }
		@keyframes write {
			0%, 32%, 65% { transform: translate(0, 0) rotate(0deg) scale(1, 1); }
			16% { transform: translate(0px, 0px) rotate(5deg) scale(0.8, 1); }
			48% { transform: translate(0px, 0px) rotate(6deg) scale(0.8, 1); }
			83% { transform: translate(0px, 0px) rotate(4deg) scale(0.8, 1); }
		}
		@keyframes text-red { 0% { width: 0%; } 100% { width: 98%; } }
		@keyframes show-flames { 0%, 74% { opacity: 0; } 80%, 99% { opacity: 1; } 100% { opacity: 0; } }
		@keyframes red-flame { 0%, 100% { transform: translateY(-30px) scale(1, 1); } 25% { transform: translateY(-30px) scale(1.1, 1.1); } 75% { transform: translateY(-30px) scale(0.8, 0.7); } }
		@keyframes yellow-flame { 0% { transform: translateY(-30px) scale(0.8, 0.7); } 50% { transform: translateY(-30px) scale(1.1, 1.2); } 100% { transform: translateY(-30px) scale(1, 1); } }

		/* ==========================================================================
		   GIAO DIỆN TRÒ CHƠI CHÍNH STYLES
		   ========================================================================== */
		body:before {
			content: "";
			position: absolute;
			width: 100%;
			height: 100%;
			background: repeating-conic-gradient(#FFF9 0%, #fff0 .000075%, #fff0 .0005%, #fff0 .12345%);
			filter: blur(0.5px) drop-shadow(0 0 1px #fff) drop-shadow(0 0 1px #fff);
			z-index: 0;
		}

		.content {
			width: 100vw;
			height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			position: relative;
		}

		#tree-canvas {
			position: absolute;
			top: 0;
			left: 0;
			width: 100vw;
			height: 100vh;
			z-index: 4;
			pointer-events: none;
		}

		.buildings {
			width: 100vw;
			height: 100vh;
			background: linear-gradient(180deg, #021023, #222329); 
			clip-path: polygon(0% 41%, 15% 26%, 27% 42%, 32% 42%, 33% 40%, 29% 40%, 46% 16%, 63% 39%, 59% 39%, 61% 42%, 68% 41.5%, 70% 27%, 89% 27%, 92% 41%, 100% 40%, 100% 100%, 0% 100%);
			position: absolute;
			top: 0;
			left: 0;
			z-index: 1;
		}

		.window {
			background: 
				linear-gradient(88deg, #fff0 0 calc(50% - 0.2vw), #111 calc((50% - 0.2vw) + 1px) calc(50% + 0.2vw), #fff0 calc((50% + 0.2vw) + 1px) 100%), 
				repeating-linear-gradient(182deg, #fff0 0 calc(30% - 0.2vw), #111 calc((30% - 0.2vw) + 1px) calc(30% + 0.2vw), #fff0 calc((30% + 0.2vw) + 1px) 37%), #e7d09a;
			width: 5vmin;
			height: 7vmin;
			position: absolute;
			left: 5vw;
			transform: scale(0.8);
			margin-top: 3vmin;
			clip-path: polygon(0 0, 100% 0, 85% 100%, 10% 100%);
		}
		.window:nth-child(2) { left: 16vw; margin-top: 3.25vmin; }
		.window:nth-child(3) { left: 12vw; margin-top: -26vmin; clip-path: polygon(5% 0%, 97% 1%, 85% 65%, 10% 63%); }
		.window:nth-child(4) { right: 12vw; margin-top: -4vmin; left: inherit; }
		.window:nth-child(5) { right: 22vw; margin-top: -4vmin; left: inherit; transform: scale(0.85) rotateY(180deg); }

		.ground {
			background: radial-gradient(circle at 50% 350vh, var(--ground-light) 0 343vh, #333 calc(343vh + 2px) 346vh, var(--ground-dark) calc(346vh + 2px) 100%);
			position: absolute;
			width: 150vw;
			height: 26vh;
			bottom: 0;
			border-radius: 100% 100% 0 0;
			z-index: 2;
			opacity: 0.5;
		}

		.sewer {
			position: absolute;
			width: 130px;
			height: 50px;
			margin-left: -500px;
			margin-top: -50px;
			clip-path: polygon(0% 33%, 65% 10%, 100% 35%, 40% 80%);
			background: 
				linear-gradient(-188deg, var(--sewer-dark) 0 19px, #fff0 20px 100%), 
				linear-gradient(-16deg, var(--sewer-dark) 0 34px, #fff0 35px 100%), 
				linear-gradient(-163deg, var(--sewer-dark) 0 19px, #fff0 20px 100%), 
				linear-gradient(25deg, var(--sewer-dark) 0 33px, var(--sewer-light) 34px 39px, var(--sewer-dark) 40px 46px, var(--sewer-light) 47px 52px, var(--sewer-dark) 53px 59px, var(--sewer-light) 60px 67px, var(--sewer-dark) 68px 73px, var(--sewer-light) 74px 90px, #fff0 0 100%);
		}

		.streetlamp {
			width: 80px;
			height: 72vh;
			position: absolute;
			top: 20vh;
			left: 32%;
			max-width: 80px;
			min-width: 80px;
			z-index: 3;
		}

		.base {
			bottom: 0; right: 0; position: absolute; width: 81%; height: 24%;
			background: linear-gradient(-94deg, var(--pole-dark) 0 23%, #fff0 calc(23% + 1px) 100%), linear-gradient(-1deg, var(--pole-dark) 0 3.65%, #fff0 calc(1.65% + 1px) 100%), linear-gradient(85deg, var(--pole-dark) 0 58%, var(--pole-light) calc(58% + 1px) 100%);
			border-radius: 2px; clip-path: polygon(15% 0, 76% 0, 95% 99%, 0% 99%); z-index: 1;
		}

		.basetop {
			background: #1e2634; width: 75%; height: 3%; position: absolute;
			bottom: 24%; left: 16%; border-radius: 2px; z-index: 2; transform: rotate(-0.5deg);
		}

		.pole {
			position: absolute; width: 25%; height: 56.5%;
			background: linear-gradient(-1deg, var(--pole-dark) 0 1.65%, #fff0 calc(1.65% + 1px) 100%), linear-gradient(-91deg, var(--pole-dark) 0 35%, #fff0 calc(35% + 1px) 100%), linear-gradient(89.5deg, var(--pole-dark) 0 40%, var(--pole-light) calc(40% + 1px) 100%);
			bottom: 26.25%; left: 45%; clip-path: polygon(17% 0, 60% 0, 95% 99%, 0% 99%); z-index: 1;
		}

		.poletop {
			width: 20%; height: 1.5%; background: var(--pole-dark); position: absolute;
			bottom: 82%; left: 44%; z-index: 1; clip-path: polygon(0% 0, 100% 0, 95% 65%, 10% 72%);
		}

		.head { position: absolute; width: 100%; height: 100px; bottom: 83%; z-index: 5; }
		.head .top {
			background: conic-gradient(from 131deg at 55% 0, var(--pole-light) 0 12%, var(--pole-dark) 13% 29.5%, #fff0 0 100%);
			width: 100%; height: 30%; top: 20%; position: absolute; transform: rotate(-3deg);
		}
		.head .bot {
			width: 75%; height: 5%; background: linear-gradient(45deg, #fff0 12%, var(--pole-dark) 0 65%, #fff0 0 100%), linear-gradient(-50deg, #fff0 8%, var(--pole-dark) 0 65%, #fff0 0 100%);
			left: 17%; position: absolute; bottom: 1%; transform: rotate(-3deg);
		}

		.glass {
			background: 
				linear-gradient(-79deg, #fff0 0 12%, var(--pole-dark) 13% 16%, #fff0 17% 100%), 
				conic-gradient(from -46deg at 53% 200%, #fff0 0 13%, var(--pole-dark) 13.2% 14%, #fff0 14.2% 100%), 
				linear-gradient(70deg, #fff0 0 21%, var(--pole-dark) 22% 25%, #fff0 26% 100%), 
				radial-gradient(circle at 37% 250%, #fff0 0 73%, #e4ce8b 75% 100%), 
				radial-gradient(circle at 37% 300%, #fff0 0 73%, #e4ce8b 75% 100%), 
				conic-gradient(from -46deg at 53% 200%, #fff0 0 7%, #f5f3b0 0 13%, var(--pole-dark) 13.2% 14%, #fff0 14.2% 100%), 
				linear-gradient(-79deg, #fff0 0 12%, var(--pole-dark) 13% 16%, #ffe5ad 17% 50%, #fff0 17% 100%);
			background-repeat: no-repeat; background-size: 100% 100%, 100% 100%, 100% 100%, 33% 42%, 50% 35%, 100% 100%;
			background-position: 0 0, 0 0, 0 0, 90% 0, 20% 0, 0 0;
			width: 100%; height: 45%; top: 50%; position: absolute; transform: rotate(-3deg); opacity: 0.5;
		}

		.light {
			background: linear-gradient(180deg, #dac47080, #dac47020 90%, #fff0 100%);
			width: 650px; height: 64vh; position: absolute; left: -274px; bottom: 1.5%;
			clip-path: polygon(43% 1%, 53% 0.35%, 100% 100%, 0 100%); opacity: 0; pointer-events: none;
		}

		.ground-light {
			background: #dac47080; width: 650px; left: -275px; position: absolute;
			bottom: -28px; height: 80px; border-radius: 100%; z-index: 0; opacity: 0; pointer-events: none;
		}

		.top:before {
			content: ""; position: absolute; background: var(--pole-light); width: 8px; height: 12px;
			border-radius: 100%; left: 48%; top: -40%; border: 3px solid var(--pole-dark); border-left-width: 0;
		}
		.top:after {
			content: ""; position: absolute; background: var(--pole-dark); width: 4px; height: 12px;
			border-radius: 100%; left: 52%; top: -70%;
		}

		#btn { display: none; }

		label[for=btn] {
			position: absolute; width: 80%; height: 55%; z-index: 6;
			top: 45%; left: 11%; border-radius: 50% 50% 100% 150%; cursor: pointer;
		}

		#btn:checked + .content .light,
		#btn:checked + .content .ground-light,
		#btn:checked + .content .head .glass {
			animation: turn-on 2s ease 0s 1;
			opacity: 1;
		}
		#btn:checked + .content .ground { opacity: 0.9; }

		@keyframes turn-on {
			0%, 10%, 25% { opacity: 0; }
			5%, 15%, 35%, 100% { opacity: 1; }
		}

		.quiz-container {
			position: absolute;
			right: 8%;
			top: 50%;
			transform: translateY(-50%);
			background: rgba(18, 25, 41, 0.55);
			backdrop-filter: blur(20px);
			-webkit-backdrop-filter: blur(20px);
			border: 1px solid rgba(255, 255, 255, 0.2);
			border-radius: 24px;
			box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
			padding: 25px;
			width: 90%;
			max-width: 460px;
			text-align: center;
			overflow: hidden;
			z-index: 10;
			transition: all 0.3s ease;
		}

		.audio-control {
			position: absolute; top: 15px; right: 15px; background: rgba(255, 255, 255, 0.2);
			border: none; color: white; font-size: 14px; padding: 6px 12px; border-radius: 20px;
			cursor: pointer; font-weight: bold; backdrop-filter: blur(5px);
		}
		.audio-control:hover { background: rgba(255, 255, 255, 0.4); }

		h1.game-title {
			color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.4);
			font-size: 19px; font-weight: 800; margin-top: 15px; margin-bottom: 12px;
		}

		.progress {
			font-size: 13px; font-weight: bold; color: #fff;
			background: linear-gradient(90deg, #ff9800, #ff5722);
			padding: 5px 16px; border-radius: 20px; display: inline-block; margin-bottom: 15px;
		}

		.quiz-image {
			width: 100%; height: 170px; object-fit: contain;
			background-color: rgba(255, 255, 255, 0.95);
			border-radius: 14px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
		}

		.question {
			font-size: 16px; font-weight: 700; color: #ffffff;
			margin-bottom: 18px; line-height: 1.5; text-shadow: 0 1px 2px rgba(0,0,0,0.5);
		}

		.options-container { display: flex; flex-direction: column; gap: 10px; }

		.option-btn {
			background-color: rgba(255, 255, 255, 0.9);
			border: none; border-radius: 12px; padding: 12px 16px;
			font-size: 14px; font-weight: 600; color: #2c3e50;
			cursor: pointer; text-align: left; transition: all 0.2s ease;
		}
		.option-btn:hover { background-color: #fffde7; transform: translateY(-2px); }

		.correct { background: linear-gradient(90deg, #4caf50, #81c784) !important; color: white !important; }
		.wrong { background: linear-gradient(90deg, #e53935, #ef5350) !important; color: white !important; }

		.feedback-overlay {
			position: absolute; top: 0; left: 0; width: 100%; height: 100%;
			display: flex; flex-direction: column; justify-content: center; align-items: center;
			z-index: 20; display: none;
		}
		.feedback-overlay.good-bg { background: rgba(13, 31, 18, 0.96); }
		.feedback-overlay.bad-bg { background: rgba(38, 15, 15, 0.96); }
		.feedback-text { font-size: 30px; font-weight: 900; margin-top: 15px; }
		.feedback-text.good { color: #4caf50; }
		.feedback-text.bad { color: #f44336; }

		.confetti {
			position: absolute; width: 8px; height: 8px; border-radius: 50%;
			animation: fall 1.5s linear infinite; opacity: 0.8;
		}

		.shake-screen { animation: screenShake 0.4s ease-in-out; }
		.result-screen { display: none; }
		.restart-btn {
			background: linear-gradient(135deg, #ff5722 0%, #ff9800 100%);
			color: white; border: none; padding: 12px 30px; font-size: 15px;
			border-radius: 25px; cursor: pointer; margin-top: 20px; font-weight: bold;
		}

		#interactive-hint {
			position: absolute;
			left: 25px;
			bottom: 25px;
			color: rgba(255, 255, 255, 0.6);
			font-family: 'Poiret One', cursive;
			font-size: 20px;
			z-index: 5;
			pointer-events: none;
			text-shadow: 0 2px 4px rgba(0,0,0,0.5);
		}

		@keyframes screenShake { 0%, 100% { transform: translateY(-50%) translateX(0); } 20%, 60% { transform: translateY(-50%) translateX(-8px); } 40%, 80% { transform: translateY(-50%) translateX(8px); } }
		@keyframes fall { 0% { transform: translateY(-50px); opacity: 1; } 100% { transform: translateY(350px); opacity: 0; } }

		@media screen and (max-width: 850px) {
			.streetlamp { left: 8%; transform: scale(0.75); top: 12vh; }
			.quiz-container { right: 5%; top: 50%; max-width: 360px; background: rgba(10, 16, 28, 0.85); }
		}
		@media screen and (max-width: 550px) {
			.streetlamp { display: none; }
			.quiz-container { position: relative; right: 0; top: 0; transform: none; margin: 15px; width: 90%; }
			#interactive-hint { display: none; }
		}
	</style>
</head>
<body>

<div id="intro-screen">
	<div id="deadline">
		<svg preserveAspectRatio="none" id="line" viewBox="0 0 581 158" enable-background="new 0 0 581 158">
			<g id="fire">
				<rect id="mask-fire-black" x="511" y="41" width="38" height="34"/>
				<g>
					<defs><rect id="mask_fire" x="511" y="41" width="38" height="34"/></defs>
					<clipPath id="mask-fire_1_"><use xlink:href="#mask_fire" overflow="visible"/></clipPath>
					<g id="group-fire" clip-path="url(#mask-fire_1_)">
						<path id="red-flame" fill="#B71342" d="M528.377,100.291c6.207,0,10.947-3.272,10.834-8.576 c-0.112-5.305-2.934-8.803-8.237-10.383c-5.306-1.581-3.838-7.9-0.79-9.707c-7.337,2.032-7.581,5.891-7.11,8.238 c0.789,3.951,7.56,4.402,5.077,9.48c-2.482,5.079-8.012,1.129-6.319-2.257c-2.843,2.233-4.78,6.681-2.259,9.703 C521.256,98.809,524.175,100.291,528.377,100.291z"/>
						<path id="yellow-flame" opacity="0.71" fill="#F7B523" d="M528.837,100.291c4.197,0,5.108-1.854,5.974-5.417 c0.902-3.724-1.129-6.207-5.305-9.931c-2.396-2.137-1.581-4.176-0.565-6.32c-4.401,1.918-3.384,5.304-2.482,6.658 c1.511,2.267,2.099,2.364,0.42,5.8c-1.679,3.435-5.42,0.764-4.275-1.527c-1.921,1.512-2.373,4.04-1.528,6.563 C522.057,99.051,525.994,100.291,528.837,100.291z"/>
						<path id="white-flame" opacity="0.81" fill="#FFFFFF" d="M529.461,100.291c-2.364,0-4.174-1.322-4.129-3.469 c0.04-2.145,1.117-3.56,3.141-4.198c2.022-0.638,1.463-3.195,0.302-3.925c2.798,0.821,2.89,2.382,2.711,3.332 c-0.301,1.597-2.883,1.779-1.938,3.834c0.912,1.975,3.286,0.938,2.409-0.913c1.086,0.903,1.826,2.701,0.864,3.924 C532.18,99.691,531.064,100.291,529.461,100.291z"/>
					</g>
				</g>

	/* --- BỘ NÃO ĐIỀU KHIỂN CÂY TƯƠNG TÁC (INTERACTIVE TREE) --- */
	!function() {
		"use strict";
		function Branch(parent, level, x, y) {
			this.parent = parent;
			this.branches = [];
			this.p0 = parent ? parent.p1 : new Point(x, y);
			this.p1 = new Point(x, y);
			this.level = level;
			this.life = 20;
			this.angle = 0;
			this.vx = 0;
			this.vy = 0;
		}
		Branch.prototype.grow = function() {
			for (var i = 0; i < this.branches.length; i++) this.branches[i].grow();
			if (this.life > 1) {
				this.p1.x += this.vx;
				this.p1.y += this.vy;
				ctx.beginPath();
				ctx.lineCap = "round";
				if (this.level) {
					ctx.lineWidth = this.level * 4 - 2;
					ctx.strokeStyle = "rgba(255, 223, 64, " + (this.level / maxLevels) + ")";
					if (this.parent) {
						ctx.moveTo(this.parent.p0.x, this.parent.p0.y);
						ctx.quadraticCurveTo(this.p0.x, this.p0.y, this.p1.x, this.p1.y);
					}
					ctx.stroke();
				} else {
					ctx.lineWidth = 6;
					ctx.strokeStyle = "#ff5722";
					ctx.moveTo(this.p0.x, this.p0.y);
					ctx.lineTo(this.p1.x, this.p1.y);
					ctx.stroke();
				}
			}
			if (this.life === 1 && this.level > 0 && this.level < maxLevels) {
				this.branches.push(newBranch(this));
				this.branches.push(newBranch(this));
			}
			this.life--;
		};
		function Point(x, y) { this.x = x; this.y = y; }
		function newBranch(parent) {
			var branch = new Branch(parent, parent.level - 1, parent.p1.x, parent.p1.y);
			branch.angle = (autorun && parent.level === maxLevels) ? Math.random() * 2 * Math.PI : Math.atan2(
				parent.p1.y - parent.p0.y,
				parent.p1.x - parent.p0.x
			) + (Math.random() * 1.4 - 0.7);
			branch.vx = Math.cos(branch.angle) * 12;
			branch.vy = Math.sin(branch.angle) * 12;
			branch.life = branch.level === 1 ? 5 : Math.round(Math.random() * (branch.level * 2)) + 2;
			return branch;
		}
		function run() {
			requestAnimationFrame(run);
			if (++frame % 2) {
				ctx.globalCompositeOperation = "lighter";
				ctx.fillStyle = "rgba(23, 23, 95, 0.04)";
				ctx.fillRect(0, 0, canvas.width, canvas.height);
				ctx.globalCompositeOperation = "source-over";
			}
			current.p1.x = pointer.x;
			current.p1.y = pointer.y;
			root.grow();
			if ((autorun && Math.random() > 0.8) || pointer.moveDistance > 20) {
				pointer.moveDistance = 0;
				var branch = new Branch(current, current.level, current.p1.x, current.p1.y);
				current.branches.push(branch);
				if (Math.random() > 0.8) current.branches.push(newBranch(current));
				current = branch;
				nBranches++;
			}
			if (nBranches > maxBranches) {
				root = root.branches[0];
				nBranches--;
			}
		}
		var canvas = {
			elem: document.getElementById('tree-canvas'),
			width: 0,
			height: 0,
			resize: function() {
				this.width = this.elem.width = window.innerWidth;
				this.height = this.elem.height = window.innerHeight;
			}
		};
		var ctx = canvas.elem.getContext("2d");
		window.addEventListener('resize', canvas.resize.bind(canvas), false);
		canvas.resize();
		var pointer = {
			x: window.innerWidth * 0.3,
			y: window.innerHeight * 0.5,
			px: 0, py: 0, moveDistance: 0,
			move: function(e) {
				var target = e.targetTouches ? e.targetTouches[0] : e;
				this.x = target.clientX;
				this.y = target.clientY;
				var dx = this.x - this.px;
				var dy = this.y - this.py;
				this.moveDistance += Math.sqrt(dx * dx + dy * dy);
				if (this.moveDistance > 40) {
					this.x = this.px + dx * 0.1;
					this.y = this.py + dy * 0.1;
				}
				if (autorun) {
					this.x = target.clientX;
					this.y = target.clientY;
					root = new Branch(false, maxLevels, this.x, this.y);
					current = root;
					autorun = false;
					document.getElementById("interactive-hint").innerHTML = "✨ Cây ma thuật đang nhảy múa theo bạn!";
				}
				this.px = this.x;
				this.py = this.y;
			}
		};
		window.addEventListener("mousemove", pointer.move.bind(pointer), false);
		window.addEventListener("touchmove", pointer.move.bind(pointer), { passive: false });
		var maxLevels = 7, nBranches = 0, maxBranches = 150, autorun = true, frame = 0;
		var root = new Branch(false, maxLevels, pointer.x, pointer.y);
		var current = root;
		run();
	}();

	/* --- LOGIC CỦA MÀN HÌNH INTRO DEADLINE --- */
	jQuery(document).ready(function($){
		const animationTime = 7; // Tối ưu thành 7 giây để Intro diễn ra nhanh, cuốn hút
		const days = 7;
		
		$('#progress-time-fill, #death-group').css('animation-duration', `${animationTime}s`);
		
		const animationSteps = [
			{ time: 0, duration: '1.5s' },
			{ time: 1500, duration: '1s' },
			{ time: 3000, duration: '0.7s' },
			{ time: 4500, duration: '0.3s' },
			{ time: 6000, duration: '0.2s' }
		];
		
		function deadlineAnimation() {
			animationSteps.forEach(step => {
				setTimeout(() => $('#designer-arm-grop').css('animation-duration', step.duration), step.time);
			});
		}
		
		function timer(totalTime, deadline) {
			let actualDay = deadline;
			const dayDuration = (totalTime * 1000) / deadline;
			const countTime = () => {
				if (--actualDay >= 0) {
					$('.deadline-days .day').text(actualDay);
				} else {
					clearInterval(timerInterval);
					startGame(); // Khi đếm ngược hết 7 ngày, tự động chuyển vào game chính
				}
			};
			const timerInterval = setInterval(countTime, dayDuration);
		}
		
		function deadlineText() {
			const $el = $('.deadline-days');
			const html = ['mask-red', 'mask-white'].map(mask => `<div class="${mask}"><div class="inner">${$el.html()}</div></div>`).join('');
			$el.html(html);
		}
		
		deadlineText();
		deadlineAnimation();
		timer(animationTime, days);
	});

		}
	}

	document.body.addEventListener('click', function() {
		if(isGameStarted && !isMusicPlaying && bgMusic.paused) {
			bgMusic.volume = 0.3;
			bgMusic.play().catch(() => {});
			isMusicPlaying = true;
			audioBtn.innerText = "🔊 Nhạc: Bật";
		}
	}, { once: false });

	function spawnConfetti() {
		const overlay = document.getElementById("feedback-overlay");
		const colors = ['#ffeb3b', '#ff5722', '#4caf50', '#00e5ff', '#e91e63'];
		for (let i = 0; i < 30; i++) {
			const particle = document.createElement("div");
			particle.className = "confetti";
			particle.style.left = Math.random() * 100 + "%";
			particle.style.top = (Math.random() * 20) - 5 + "%";
			particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
			particle.style.width = (Math.random() * 6 + 6) + "px";
			particle.style.height = (Math.random() * 6 + 6) + "px";
			particle.style.animationDuration = (Math.random() * 0.8 + 0.8) + "s";
			overlay.appendChild(particle);
		}
	}

	function clearConfetti() { document.querySelectorAll(".confetti").forEach(c => c.remove()); }

	function loadQuestion() {
		canAnswer = true;
		document.getElementById("feedback-overlay").style.display = "none";
		clearConfetti();
		
		const currentQuiz = quizData[currentQuestionIndex];
		
		document.getElementById("progress").innerText = `Câu hỏi ${currentQuestionIndex + 1} / ${quizData.length}`;
		document.getElementById("quiz-image").src = currentQuiz.image;
		document.getElementById("question-text").innerText = currentQuiz.question;
		
		const optionsContainer = document.getElementById("options-container");
		optionsContainer.innerHTML = "";
		
		currentQuiz.options.forEach((option, index) => {
			const button = document.createElement("button");
			button.classList.add("option-btn");
			button.innerText = option;
			button.onclick = () => selectOption(index, button);
			optionsContainer.appendChild(button);
		});
	}

	function selectOption(selectedIndex, clickedButton) {
		if (!canAnswer) return;
		canAnswer = false;

		const currentQuiz = quizData[currentQuestionIndex];
		const buttons = document.querySelectorAll(".option-btn");
		const overlay = document.getElementById("feedback-overlay");
		const fbIcon = document.getElementById("feedback-icon");
		const fbText = document.getElementById("feedback-text");
		const mainCard = document.getElementById("main-card");

		if (selectedIndex === currentQuiz.correct) {
			clickedButton.classList.add("correct");
			score++;
			soundCorrect.currentTime = 0;
			soundCorrect.play().catch(() => {});
			
			fbIcon.innerText = "✨🎉✨";
			fbText.innerText = "Chính xác, giỏi quá!";
			fbText.className = "feedback-text good";
			overlay.className = "feedback-overlay good-bg";
			spawnConfetti(); 
		} else {
			clickedButton.classList.add("wrong");
			buttons[currentQuiz.correct].classList.add("correct");
			soundWrong.currentTime = 0;
			soundWrong.play().catch(() => {});
			
			fbIcon.innerText = "💥";
			fbText.innerText = "Tiếc quá, sai rồi!";
			fbText.className = "feedback-text bad";
			overlay.className = "feedback-overlay bad-bg";
			
			mainCard.classList.add("shake-screen");
			setTimeout(() => mainCard.classList.remove("shake-screen"), 400);
		}

		setTimeout(() => { overlay.style.display = "flex"; }, 150);

		setTimeout(() => {
			currentQuestionIndex++;
			if (currentQuestionIndex < quizData.length) {
				loadQuestion();
			} else {
				showResults();
			}
		}, 2000); 
	}

	function showResults() {
		document.getElementById("feedback-overlay").style.display = "none";
		document.getElementById("quiz-screen").style.display = "none";
		document.getElementById("result-screen").style.display = "block";
		
		document.getElementById("score-text").innerText = `Em đạt được ${score} / ${quizData.length} điểm!`;
		
		let rank = "";
		if(score === 5) rank = "🥇 Trạng Nguyên Nhí! Kiến thức non sông đất nước của em thật tuyệt hảo!";
		else if(score >= 3) rank = "🥈 Bạn Học Khá Giỏi! Cố gắng phát huy thêm ở những lần sau nha!";
		else rank = "📚 Hãy ôn lại kiến thức Địa lý Lớp 5 và tham gia thử thách lại nhé!";
		
		document.getElementById("rank-text").innerText = rank;
	}

	function restartQuiz() {
		currentQuestionIndex = 0;
		score = 0;
		document.getElementById("quiz-screen").style.display = "block";
		document.getElementById("result-screen").style.display = "none";
		loadQuestion();
	}

	loadQuestion();
</script>

</body>
</html>
